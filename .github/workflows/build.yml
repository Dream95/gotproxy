name: Build

on:
  pull_request: 
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.4'

    - name: Init
      run: /bin/bash init_env.sh

    - name: Submodule
      run: git submodule update --init --recursive

    - name: Build amd64
      if: matrix.arch == 'amd64'
      run: make clean && make build-bpf && make

    - name: Build arm64
      if: matrix.arch == 'arm64'
      run: make clean && make build-bpf && GOOS=linux GOARCH=arm64 go build -o gotproxy ./cmd

    - name: Set DNS to 1.1.1.1 (avoid 127.0.0.53)
      if: matrix.arch == 'amd64'
      run: |
        set -e
        sudo rm -f /etc/resolv.conf
        printf "nameserver 1.1.1.1\nnameserver 1.0.0.1\noptions timeout:1 attempts:2\n" | sudo tee /etc/resolv.conf >/dev/null
        echo "[INFO] /etc/resolv.conf:"
        cat /etc/resolv.conf

    - name: Run proxy tests
      if: matrix.arch == 'amd64'
      run: sudo ./scripts/test_proxy.sh

    - name: Run git proxy tests
      if: matrix.arch == 'amd64'
      env:
        TEST_REMOTE_URL: https://github.com/octocat/Hello-World
      run: sudo bash ./scripts/test_git.sh

    - name: Package artifact
      run: tar -czf gotproxy_${{ matrix.arch }}.tar.gz gotproxy

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: gotproxy_${{ matrix.arch }}
        path: ./gotproxy_${{ matrix.arch }}.tar.gz